<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Gate Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08090e;font-family:'Share Tech Mono',monospace;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 12px 40px}

/* HEADER */
.header{width:100%;max-width:560px;text-align:center;padding:1.5rem 0 .5rem}
.title{font-family:'Orbitron',monospace;font-size:clamp(16px,4vw,24px);font-weight:900;letter-spacing:4px}
.title span{color:#fbbf24}
.subtitle{font-size:10px;color:#444;letter-spacing:3px;margin-top:5px}

/* PROGRESS */
.progress-wrap{width:100%;max-width:560px;margin-bottom:1.2rem}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;color:#444;font-family:'Orbitron',monospace;margin-bottom:6px;letter-spacing:1px}
.progress-bar{height:3px;background:#1a1c28;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#ef4444);border-radius:2px;transition:width .4s ease}
.dots{display:flex;gap:8px;justify-content:center;margin-top:10px}
.dot{width:10px;height:10px;border-radius:50%;border:1px solid #2a2d38;background:#13141e;transition:all .3s}
.dot.done-ok{background:#22c55e;border-color:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.5)}
.dot.done-fail{background:#ef4444;border-color:#ef4444}
.dot.current{border-color:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.4)}

/* CARD */
.card{width:100%;max-width:560px;background:#0f1018;border:1px solid #1e2030;border-radius:14px;padding:1.5rem;margin-bottom:1rem}

/* LEVEL BADGE */
.level-badge{display:inline-flex;align-items:center;gap:6px;background:#13141e;border:1px solid #2a2d38;border-radius:20px;padding:4px 12px;font-size:10px;color:#666;font-family:'Orbitron',monospace;letter-spacing:2px;margin-bottom:1rem}
.level-dot{width:6px;height:6px;border-radius:50%}

/* EXPRESSION */
.expr-block{background:#13141e;border:1px solid #1e2030;border-radius:10px;padding:1rem 1.2rem;margin-bottom:1.2rem;text-align:center}
.expr-text{font-family:'Orbitron',monospace;font-size:clamp(18px,5vw,28px);font-weight:700;letter-spacing:2px;color:#fff;margin-bottom:.75rem}
.vars-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.var-pill{background:#1a1c28;border:1px solid #2a2d38;border-radius:6px;padding:5px 14px;font-size:13px;font-family:'Orbitron',monospace}
.var-pill span{font-weight:900}
.var-pill .v1{color:#22c55e}
.var-pill .v0{color:#ef4444}

/* STEPS */
.steps-title{font-size:10px;color:#444;letter-spacing:2px;margin-bottom:.6rem;text-transform:uppercase}
.step-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.2rem}
.step-item{display:flex;align-items:center;gap:10px;background:#13141e;border:1px solid #1e2030;border-radius:8px;padding:8px 12px;font-size:13px;opacity:.4;transition:all .3s}
.step-item.active{opacity:1;border-color:#fbbf24;background:#1a1a10}
.step-item.done-ok{opacity:1;border-color:#22c55e;background:#0d1a10}
.step-item.done-fail{opacity:1;border-color:#ef4444;background:#1a0d0d}
.step-num{width:20px;height:20px;border-radius:50%;background:#1e2030;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'Orbitron',monospace;flex-shrink:0}
.step-expr{flex:1;font-family:'Share Tech Mono',monospace}
.step-badge{font-size:11px;font-weight:700;min-width:20px;text-align:center}

/* INPUT AREA */
.input-area{margin-bottom:1rem}
.input-question{font-size:12px;color:#888;letter-spacing:1px;margin-bottom:.5rem}
.answer-row{display:flex;gap:8px}
.ans-btn{flex:1;padding:14px;background:#13141e;border:1px solid #1e2030;border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:18px;font-weight:900;cursor:pointer;transition:all .15s;letter-spacing:2px}
.ans-btn:hover{border-color:#444;background:#1a1c28;transform:translateY(-1px)}
.ans-btn.selected-ok{background:#0d1a10;border-color:#22c55e;color:#22c55e;box-shadow:0 0 16px rgba(34,197,94,.2)}
.ans-btn.selected-fail{background:#1a0d0d;border-color:#ef4444;color:#ef4444;box-shadow:0 0 16px rgba(239,68,68,.2)}
.ans-btn.correct-hint{border-color:#22c55e;color:#22c55e}
.ans-btn:disabled{cursor:default}

/* FEEDBACK */
.feedback{min-height:28px;text-align:center;font-size:12px;letter-spacing:1px;padding:4px 0;transition:all .3s;opacity:0}
.feedback.show{opacity:1}
.feedback.ok{color:#22c55e;font-family:'Orbitron',monospace}
.feedback.fail{color:#ef4444}
.feedback.info{color:#888}

/* NEXT BTN */
.next-btn{width:100%;padding:13px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000;font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:3px;border:none;border-radius:8px;cursor:pointer;transition:all .15s;display:none}
.next-btn.show{display:block}
.next-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(251,191,36,.4)}

/* SCORE CARD */
.score-card{width:100%;max-width:560px;background:#0f1018;border:2px solid #fbbf24;border-radius:14px;padding:2rem;text-align:center;display:none}
.score-card.show{display:block;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.score-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fbbf24;letter-spacing:4px;margin-bottom:.5rem}
.score-num{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;margin:.5rem 0}
.score-label{font-size:11px;color:#555;letter-spacing:2px;margin-bottom:1.5rem}
.score-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.score-item{background:#13141e;border-radius:8px;padding:.75rem;font-size:12px}
.score-item .si-label{color:#555;font-size:10px;letter-spacing:1px;margin-bottom:4px}
.score-item .si-val{font-family:'Orbitron',monospace;font-size:16px;font-weight:700}
.play-again{padding:12px 32px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000;font-family:'Orbitron',monospace;font-size:11px;font-weight:900;letter-spacing:3px;border:none;border-radius:8px;cursor:pointer;transition:all .15s}
.play-again:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(251,191,36,.4)}

/* ROUND COMPLETE */
.round-msg{font-size:11px;color:#666;letter-spacing:1px;text-align:center;margin-bottom:.5rem}

/* BULB */
.bulb-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:1rem}
.bulb-label{font-size:9px;color:#444;letter-spacing:3px;font-family:'Orbitron',monospace}
.bulb{width:56px;height:56px;transition:all .4s ease}
.bulb svg .bulb-glass{transition:all .4s ease}
.bulb svg .bulb-rays{transition:all .4s ease;opacity:0}
.bulb.on svg .bulb-glass{fill:#fbbf24}
.bulb.on svg .bulb-base{fill:#92400e}
.bulb.on svg .bulb-rays{opacity:1}
.bulb.off svg .bulb-glass{fill:#2a2d38}
.bulb.off svg .bulb-base{fill:#374151}
.bulb-result{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;min-height:18px;text-align:center;transition:all .3s;letter-spacing:2px}
.bulb-result.on{color:#fbbf24}
.bulb-result.off{color:#444}
@keyframes bulbPop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.bulb.on{animation:bulbPop .35s ease;filter:drop-shadow(0 0 10px #fbbf24) drop-shadow(0 0 24px #f59e0b)}
.bulb.off{filter:none}
</style>
</head>
<body>

<div class="header">
  <div class="title">⚡ LOGIC GATE <span>QUIZ</span></div>
  <div class="subtitle">Álgebra de Boole · Circuitos Lógicos · Iberoamericana</div>
</div>

<div class="progress-wrap">
  <div class="progress-labels">
    <span id="q-label">PREGUNTA 1 / 4</span>
    <span id="score-label">PUNTOS: 0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="dots" id="dots"></div>
</div>

<div class="card" id="quiz-card">
  <div class="level-badge">
    <div class="level-dot" id="level-dot"></div>
    <span id="level-text">NIVEL 1</span>
  </div>

  <div class="bulb-wrap">
    <div class="bulb off" id="bulb">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <g class="bulb-rays">
          <line x1="28" y1="4" x2="28" y2="0" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
          <line x1="44" y1="8" x2="47" y2="5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
          <line x1="52" y1="24" x2="56" y2="24" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
          <line x1="44" y1="40" x2="47" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="8" x2="9" y2="5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="24" x2="0" y2="24" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="40" x2="9" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
        </g>
        <path class="bulb-glass" d="M28 8 C18 8 12 16 12 24 C12 31 16 36 20 39 L20 44 L36 44 L36 39 C40 36 44 31 44 24 C44 16 38 8 28 8Z"/>
        <path fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-linecap="round" d="M23 36 L23 30 Q26 27 28 30 Q30 33 33 30 L33 36"/>
        <rect class="bulb-base" x="20" y="44" width="16" height="4" rx="1"/>
        <rect class="bulb-base" x="21" y="48" width="14" height="3" rx="1"/>
        <rect class="bulb-base" x="22" y="51" width="12" height="2" rx="1"/>
      </svg>
    </div>
    <div class="bulb-result off" id="bulb-result">APAGADA</div>

  </div>

    <div class="expr-block">
    <div class="expr-text" id="expr-text"></div>
    <div class="vars-row" id="vars-row"></div>
  </div>

  <div class="steps-title">Resuelve paso a paso</div>
  <div class="step-list" id="step-list"></div>

  <div class="input-area">
    <div class="input-question" id="input-question"></div>
    <div class="answer-row" id="answer-row">
      <button class="ans-btn" id="btn0" onclick="answer(0)">0</button>
      <button class="ans-btn" id="btn1" onclick="answer(1)">1</button>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextStep()">CONTINUAR →</button>
</div>

<div class="round-msg" id="round-msg"></div>

<div class="score-card" id="score-card">
  <div class="score-title">🏆 RONDA COMPLETA</div>
  <div class="score-num" id="final-score"></div>
  <div class="score-label">PUNTOS</div>
  <div class="score-breakdown">
    <div class="score-item"><div class="si-label">CORRECTAS</div><div class="si-val" id="sc-ok" style="color:#22c55e">0</div></div>
    <div class="score-item"><div class="si-label">INCORRECTAS</div><div class="si-val" id="sc-fail" style="color:#ef4444">0</div></div>
    <div class="score-item"><div class="si-label">RACHA MÁX</div><div class="si-val" id="sc-streak" style="color:#fbbf24">0</div></div>
    <div class="score-item"><div class="si-label">NIVEL MÁX</div><div class="si-val" id="sc-level" style="color:#a855f7">1</div></div>
  </div>
  <button class="play-again" onclick="startGame()">↺ OTRA RONDA</button>
</div>

<script>
// ── QUESTION BANK ──
// Each question: { level, expr, vars, steps, answer }
// steps: [{label, expr, result}]

function rnd(){ return Math.round(Math.random()) }

function makeQuestions(){
  const bank = [];

  // Level 1 — simple
  const simples = [
    (a,b)=>({level:1, label:'AND', expr:`A ∧ B`, vars:{A:a,B:b},
      steps:[{label:'A ∧ B', calc:`${a} ∧ ${b}`, result:a&b}],
      answer:a&b}),
    (a,b)=>({level:1, label:'OR', expr:`A ∨ B`, vars:{A:a,B:b},
      steps:[{label:'A ∨ B', calc:`${a} ∨ ${b}`, result:a|b}],
      answer:a|b}),
    (a)=>({level:1, label:'NOT', expr:`¬ A`, vars:{A:a},
      steps:[{label:'¬A', calc:`¬${a}`, result:a?0:1}],
      answer:a?0:1}),
    (a,b)=>({level:1, label:'NAND', expr:`¬(A ∧ B)`, vars:{A:a,B:b},
      steps:[
        {label:'A ∧ B', calc:`${a} ∧ ${b}`, result:a&b},
        {label:'¬(resultado)', calc:`¬${a&b}`, result:(a&b)?0:1}
      ], answer:(a&b)?0:1}),
    (a,b)=>({level:1, label:'NOR', expr:`¬(A ∨ B)`, vars:{A:a,B:b},
      steps:[
        {label:'A ∨ B', calc:`${a} ∨ ${b}`, result:a|b},
        {label:'¬(resultado)', calc:`¬${a|b}`, result:(a|b)?0:1}
      ], answer:(a|b)?0:1}),
    (a,b)=>({level:1, label:'XOR', expr:`A ⊕ B`, vars:{A:a,B:b},
      steps:[{label:'A ⊕ B', calc:`${a} ⊕ ${b}`, result:a^b}],
      answer:a^b}),
  ];

  // Level 2 — compound 2 vars
  const compound2 = [
    (a,b)=>({level:2, label:'COMPUESTA', expr:`(A ∧ B) ∨ ¬A`, vars:{A:a,B:b},
      steps:[
        {label:'A ∧ B', calc:`${a} ∧ ${b}`, result:a&b},
        {label:'¬A', calc:`¬${a}`, result:a?0:1},
        {label:'(A∧B) ∨ ¬A', calc:`${a&b} ∨ ${a?0:1}`, result:(a&b)|(a?0:1)}
      ], answer:(a&b)|(a?0:1)}),
    (a,b)=>({level:2, label:'COMPUESTA', expr:`¬A ∧ ¬B`, vars:{A:a,B:b},
      steps:[
        {label:'¬A', calc:`¬${a}`, result:a?0:1},
        {label:'¬B', calc:`¬${b}`, result:b?0:1},
        {label:'¬A ∧ ¬B', calc:`${a?0:1} ∧ ${b?0:1}`, result:(a?0:1)&(b?0:1)}
      ], answer:(a?0:1)&(b?0:1)}),
    (a,b)=>({level:2, label:'COMPUESTA', expr:`¬(A ∨ B) ∨ A`, vars:{A:a,B:b},
      steps:[
        {label:'A ∨ B', calc:`${a} ∨ ${b}`, result:a|b},
        {label:'¬(A∨B)', calc:`¬${a|b}`, result:(a|b)?0:1},
        {label:'¬(A∨B) ∨ A', calc:`${(a|b)?0:1} ∨ ${a}`, result:((a|b)?0:1)|a}
      ], answer:((a|b)?0:1)|a}),
    (a,b)=>({level:2, label:'COMPUESTA', expr:`(A ∨ B) ∧ ¬B`, vars:{A:a,B:b},
      steps:[
        {label:'A ∨ B', calc:`${a} ∨ ${b}`, result:a|b},
        {label:'¬B', calc:`¬${b}`, result:b?0:1},
        {label:'(A∨B) ∧ ¬B', calc:`${a|b} ∧ ${b?0:1}`, result:(a|b)&(b?0:1)}
      ], answer:(a|b)&(b?0:1)}),
  ];

  // Level 3 — compound 3 vars
  const compound3 = [
    (a,b,c)=>{
      const s1=a&b, s2=c?0:1, ans=s1|s2;
      return {level:3, label:'NIVEL 3', expr:`(A ∧ B) ∨ ¬C`, vars:{A:a,B:b,C:c},
        steps:[
          {label:'A ∧ B', calc:`${a} ∧ ${b}`, result:s1},
          {label:'¬C', calc:`¬${c}`, result:s2},
          {label:'(A∧B) ∨ ¬C', calc:`${s1} ∨ ${s2}`, result:ans}
        ], answer:ans};},
    (a,b,c)=>{
      const s1=a|b, s2=c?0:1, ans=s1&s2;
      return {level:3, label:'NIVEL 3', expr:`(A ∨ B) ∧ ¬C`, vars:{A:a,B:b,C:c},
        steps:[
          {label:'A ∨ B', calc:`${a} ∨ ${b}`, result:s1},
          {label:'¬C', calc:`¬${c}`, result:s2},
          {label:'(A∨B) ∧ ¬C', calc:`${s1} ∧ ${s2}`, result:ans}
        ], answer:ans};},
    (a,b,c)=>{
      const s1=a&b, s2=s1|c, ans=s2?0:1;
      return {level:3, label:'NIVEL 3', expr:`¬((A ∧ B) ∨ C)`, vars:{A:a,B:b,C:c},
        steps:[
          {label:'A ∧ B', calc:`${a} ∧ ${b}`, result:s1},
          {label:'(A∧B) ∨ C', calc:`${s1} ∨ ${c}`, result:s2},
          {label:'¬((A∧B)∨C)', calc:`¬${s2}`, result:ans}
        ], answer:ans};},
    (a,b,c)=>{
      const s1=b&c, s2=a|s1;
      return {level:3, label:'NIVEL 3', expr:`A ∨ (B ∧ C)`, vars:{A:a,B:b,C:c},
        steps:[
          {label:'B ∧ C', calc:`${b} ∧ ${c}`, result:s1},
          {label:'A ∨ (B∧C)', calc:`${a} ∨ ${s1}`, result:s2}
        ], answer:s2};},
  ];

  const a=rnd(),b=rnd(),c=rnd();
  const a2=rnd(),b2=rnd(),c2=rnd();
  const a3=rnd(),b3=rnd(),c3=rnd();
  const a4=rnd(),b4=rnd(),c4=rnd();

  // Pick 4 questions: 1 simple, 1 compound2, 2 compound3
  const q1 = simples[Math.floor(Math.random()*simples.length)](a,b,c);
  const q2 = compound2[Math.floor(Math.random()*compound2.length)](a2,b2);
  const q3 = compound3[Math.floor(Math.random()*compound3.length)](a3,b3,c3);
  const q4 = compound3[Math.floor(Math.random()*compound3.length)](a4,b4,c4);

  return [q1,q2,q3,q4];
}

// ── STATE ──
let questions=[], qIdx=0, stepIdx=0;
let score=0, correct=0, incorrect=0, streak=0, maxStreak=0, maxLevel=1;
let stepAnswered=false, qAnswered=false;

const LEVEL_COLORS = {1:'#22c55e', 2:'#fbbf24', 3:'#ef4444'};
const LEVEL_NAMES  = {1:'NIVEL 1 — BÁSICO', 2:'NIVEL 2 — COMPUESTA', 3:'NIVEL 3 — AVANZADO'};

function startGame(){
  questions = makeQuestions();
  qIdx=0; stepIdx=0; score=0; correct=0; incorrect=0; streak=0; maxStreak=0; maxLevel=1;
  document.getElementById('score-card').classList.remove('show');
  document.getElementById('quiz-card').style.display='block';
  document.getElementById('round-msg').textContent='';
  renderDots();
  loadQuestion();
}

function renderDots(){
  const wrap = document.getElementById('dots');
  wrap.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===qIdx?' current':'');
    d.id='dot-'+i;
    wrap.appendChild(d);
  });
}

function loadQuestion(){
  stepIdx=0; stepAnswered=false; qAnswered=false;
  setBulb(null);
  const q=questions[qIdx];
  maxLevel=Math.max(maxLevel,q.level);

  // level badge
  document.getElementById('level-dot').style.background=LEVEL_COLORS[q.level];
  document.getElementById('level-text').textContent=LEVEL_NAMES[q.level];

  // expression
  document.getElementById('expr-text').textContent=q.expr;

  // vars
  const varsRow=document.getElementById('vars-row');
  varsRow.innerHTML='';
  Object.entries(q.vars).forEach(([k,v])=>{
    const pill=document.createElement('div');
    pill.className='var-pill';
    pill.innerHTML=`${k} = <span class="${v?'v1':'v0'}" style="font-weight:900">${v}</span>`;
    varsRow.appendChild(pill);
  });

  // steps
  const stepList=document.getElementById('step-list');
  stepList.innerHTML='';
  q.steps.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step-item'+(i===0?' active':'');
    el.id='step-'+i;
    el.innerHTML=`
      <div class="step-num">${i+1}</div>
      <div class="step-expr">${s.label} = ${s.calc} = <strong>?</strong></div>
      <div class="step-badge" id="step-badge-${i}"></div>
    `;
    stepList.appendChild(el);
  });

  // progress
  document.getElementById('q-label').textContent=`PREGUNTA ${qIdx+1} / ${questions.length}`;
  document.getElementById('progress-fill').style.width=`${(qIdx/questions.length)*100}%`;
  updateScoreLabel();
  renderInputArea();
  clearFeedback();
  document.getElementById('next-btn').classList.remove('show');
}

function renderInputArea(){
  const q=questions[qIdx];
  const s=q.steps[stepIdx];
  const isLast = stepIdx===q.steps.length-1;
  document.getElementById('input-question').textContent=
    isLast ? `¿Cuál es el resultado FINAL de: ${s.label}?`
           : `Paso ${stepIdx+1}: ¿Cuánto da ${s.label}?`;
  const b0=document.getElementById('btn0');
  const b1=document.getElementById('btn1');
  b0.className='ans-btn'; b1.className='ans-btn';
  b0.disabled=false; b1.disabled=false;
}

function answer(val){
  if(stepAnswered) return;
  stepAnswered=true;

  const q=questions[qIdx];
  const s=q.steps[stepIdx];
  const correct_ans = s.result;
  const isCorrect = val===correct_ans;
  const isLastStep = stepIdx===q.steps.length-1;

  // update step row
  const stepEl=document.getElementById('step-'+stepIdx);
  const badge=document.getElementById('step-badge-'+stepIdx);
  stepEl.className='step-item '+(isCorrect?'done-ok':'done-fail');
  stepEl.querySelector('strong').textContent=correct_ans;
  badge.textContent=isCorrect?'✓':'✗';
  badge.style.color=isCorrect?'#22c55e':'#ef4444';

  // highlight answer btn
  document.getElementById('btn'+val).className='ans-btn '+(isCorrect?'selected-ok':'selected-fail');
  if(!isCorrect) document.getElementById('btn'+correct_ans).className='ans-btn correct-hint';
  document.getElementById('btn0').disabled=true;
  document.getElementById('btn1').disabled=true;

  if(isLastStep){
    // question done
    if(isCorrect){
      correct++; streak++; maxStreak=Math.max(maxStreak,streak);
      const pts = q.level * 10 * (streak>2?2:1);
      score+=pts;
      showFeedback(`✓ ¡CORRECTO! +${pts} pts${streak>1?' · RACHA x'+streak:''}`, 'ok');
    } else {
      incorrect++; streak=0;
      showFeedback(`✗ Era ${correct_ans} — ¡revisa los pasos!`, 'fail');
    }
    updateDot(qIdx, isCorrect);
    updateScoreLabel();
    document.getElementById('next-btn').classList.add('show');
    document.getElementById('next-btn').textContent = qIdx<questions.length-1 ? 'SIGUIENTE PREGUNTA →' : 'VER RESULTADOS →';
    qAnswered=true;
    setBulb(q.answer);
  } else {
    // advance to next step
    showFeedback(isCorrect?`✓ Paso ${stepIdx+1} correcto — sigue`:`✗ Era ${correct_ans} — sigue al siguiente paso`, isCorrect?'ok':'fail');
    setTimeout(()=>{
      stepIdx++;
      stepAnswered=false;
      const nextStep=document.getElementById('step-'+stepIdx);
      if(nextStep) nextStep.className='step-item active';
      renderInputArea();
      clearFeedback();
    },900);
  }
}

function nextStep(){
  document.getElementById('next-btn').classList.remove('show');
  clearFeedback();
  qIdx++;
  if(qIdx>=questions.length){
    endRound();
  } else {
    // update dots
    document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('current',i===qIdx));
    document.getElementById('progress-fill').style.width=`${(qIdx/questions.length)*100}%`;
    document.getElementById('q-label').textContent=`PREGUNTA ${qIdx+1} / ${questions.length}`;
    loadQuestion();
  }
}

function endRound(){
  document.getElementById('quiz-card').style.display='none';
  document.getElementById('progress-fill').style.width='100%';
  const sc=document.getElementById('score-card');
  document.getElementById('final-score').textContent=score;
  document.getElementById('final-score').style.color=score>= 80?'#22c55e':score>=40?'#fbbf24':'#ef4444';
  document.getElementById('sc-ok').textContent=correct;
  document.getElementById('sc-fail').textContent=incorrect;
  document.getElementById('sc-streak').textContent=maxStreak;
  document.getElementById('sc-level').textContent=maxLevel;
  sc.classList.add('show');
}

function updateDot(i,ok){
  const d=document.getElementById('dot-'+i);
  if(d) d.className='dot '+(ok?'done-ok':'done-fail');
}

function showFeedback(msg,type){
  const el=document.getElementById('feedback');
  el.textContent=msg; el.className='feedback show '+type;
}
function clearFeedback(){
  const el=document.getElementById('feedback');
  el.textContent=''; el.className='feedback';
}
function updateScoreLabel(){
  document.getElementById('score-label').textContent=`PUNTOS: ${score}`;
}

function setBulb(val){
  const bulb = document.getElementById('bulb');
  const res = document.getElementById('bulb-result');
  if(val===null){
    bulb.className='bulb off';
    res.className='bulb-result off';
    res.textContent='APAGADA';
  } else if(val===1){
    bulb.className='bulb on';
    res.className='bulb-result on';
    res.textContent='ENCENDIDA 💡';
  } else {
    bulb.className='bulb off';
    res.className='bulb-result off';
    res.textContent='APAGADA ○';
  }
}

startGame();
</script>

</html>
